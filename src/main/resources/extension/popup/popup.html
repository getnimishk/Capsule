<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capsule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <div class="wrapper">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo-mark">
          <img src="../icons/icon32.png" width="18" height="18" alt="Capsule" style="display:block; object-fit:contain;" />
        </div>
        <div>
          <h1 class="header-title">Capsule</h1>
          <p class="header-sub">Current &amp; exported conversations</p>
        </div>
      </div>
    </header>

    <!-- Tabs Bar -->
    <div class="tabs-bar">
      <button id="tab-convs" class="tab-btn active">Conversations</button>
      <button id="tab-downloads" class="tab-btn">Downloads Manager</button>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <span class="search-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <input id="search-input" class="search-input" type="text" placeholder="Search&hellip;" autocomplete="off" />
      <button id="clear-search" class="clear-search" title="Clear">&#x2715;</button>
    </div>

    <!-- Filter Pills -->
    <div class="filter-pills" id="filter-pills"></div>

    <!-- Stats bar -->
    <div class="stats-bar">
      <span id="conv-count" class="stat">0 conversations</span>
    </div>

    <!-- Conversation list -->
    <div id="conversations-list" class="conversations-list">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <p class="empty-title">No conversations here</p>
        <p class="empty-hint">Open any AI conversation &mdash; it will appear automatically. Exported conversations from other AIs also appear here.</p>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <button id="export-btn" class="btn btn-ghost" title="Export all as JSON">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3v12"/><path d="m7 10 5 5 5-5"/>
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        </svg>
        Export all
      </button>
      <button id="clear-all-btn" class="btn btn-danger" title="Delete all">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        </svg>
        Clear all
      </button>
    </footer>

    <!-- Toast -->
    <div id="toast" class="toast" aria-live="polite"></div>
  </div>

  <script src="../shared/nlp_compress.js"></script>
  <script src="../shared/token_estimator.js"></script>
  <script src="../shared/llm_client.js"></script>
  <script src="popup.js"></script>
</body>

</html>
